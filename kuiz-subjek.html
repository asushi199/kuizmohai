<!DOCTYPE html>
<html lang="ms">
<head>
  <!-- Pentadbir: set KUIZ_URL_BY_SUBJECT dalam <script> di bawah (URL /exec setiap subjek). -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuiz pensijilan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ['"Crimson Pro"', 'Georgia', 'serif'], sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: { parchment: '#fdfbf7' },
        },
      },
    };
  </script>
</head>
<body class="font-sans bg-slate-50 text-slate-800 antialiased">
  <div class="min-h-screen border-b border-amber-200/80 bg-parchment/95">
    <div class="mx-auto flex max-w-4xl flex-wrap items-center justify-between gap-3 px-4 py-3 text-sm">
      <a href="tugasan.html" class="font-medium text-amber-900 underline decoration-amber-400 underline-offset-4 hover:text-amber-950">← Kembali ke Tugasan</a>
    </div>
  </div>

  <main class="mx-auto max-w-4xl px-4 pb-16 pt-8">
    <header class="border-b border-slate-200 pb-6">
      <p class="text-xs font-semibold uppercase tracking-wider text-amber-700">Tugasan 2 — pensijilan</p>
      <h1 id="subjek-title" class="mt-2 font-serif text-2xl font-bold text-slate-900 sm:text-3xl">—</h1>
      <p id="subjek-desc" class="mt-3 max-w-2xl text-sm text-slate-600"></p>
    </header>

    <div id="kuiz-mount" class="mt-8 min-h-[320px] rounded-2xl border border-slate-200 bg-white p-6 shadow-sm sm:p-8"></div>
  </main>

  <script>
    (function () {
      /** URL /exec Apps Script — boleh sama sementara; asingkan mengikut subjek apabila sedia */
      var KUIZ_URL_BY_SUBJECT = {
        bm: 'https://script.google.com/macros/s/AKfycbz2feIvjdGM8vfYZCjOwDfEV-oIEDOIQDuHEGwfLiKtGmxczCB3bkSIc8qp9mjzEAjD/exec',
        bi: 'https://script.google.com/macros/s/AKfycbz2feIvjdGM8vfYZCjOwDfEV-oIEDOIQDuHEGwfLiKtGmxczCB3bkSIc8qp9mjzEAjD/exec',
        mat: 'https://script.google.com/macros/s/AKfycbz2feIvjdGM8vfYZCjOwDfEV-oIEDOIQDuHEGwfLiKtGmxczCB3bkSIc8qp9mjzEAjD/exec',
        sejarah: 'https://script.google.com/macros/s/AKfycbz2feIvjdGM8vfYZCjOwDfEV-oIEDOIQDuHEGwfLiKtGmxczCB3bkSIc8qp9mjzEAjD/exec',
      };

      var LABEL = {
        bm: 'Bahasa Melayu',
        bi: 'Bahasa Inggeris',
        mat: 'Matematik',
        sejarah: 'Sejarah',
      };

      var params = new URLSearchParams(location.search);
      var s = (params.get('s') || '').toLowerCase().trim();
      if (s === 'matematik') s = 'mat';
      if (!KUIZ_URL_BY_SUBJECT.hasOwnProperty(s)) s = '';

      var titleEl = document.getElementById('subjek-title');
      var descEl = document.getElementById('subjek-desc');
      var mount = document.getElementById('kuiz-mount');

      if (!s) {
        if (titleEl) titleEl.textContent = 'Subjek tidak dijumpai';
        if (descEl) descEl.textContent = 'Gunakan pautan daripada halaman Tugasan (contoh: ?s=bm).';
        if (mount) mount.innerHTML = '';
        document.title = 'Kuiz pensijilan';
        return;
      }

      var label = LABEL[s];
      document.title = 'Kuiz — ' + label;
      if (titleEl) titleEl.textContent = label;
      if (descEl) {
        descEl.textContent =
          'Lengkapkan peperiksaan di halaman ini. Selepas lulus, sijil akan dijana mengikut aliran pentadbiran (e-mel atau cetak).';
      }

      var url = (KUIZ_URL_BY_SUBJECT[s] || '').trim();
      if (url && mount) {
        var sep = url.indexOf('?') >= 0 ? '&' : '?';
        var urlWithSubjek = url + sep + 's=' + encodeURIComponent(s);
        mount.innerHTML =
          '<div class="overflow-hidden rounded-xl border border-slate-200 bg-slate-50 shadow-inner">' +
          '<iframe title="Kuiz ' +
          label.replace(/"/g, '') +
          '" class="min-h-[720px] w-full border-0 sm:min-h-[780px]" src="' +
          urlWithSubjek.replace(/"/g, '&quot;') +
          '" loading="lazy" referrerpolicy="strict-origin-when-cross-origin" allow="clipboard-write"></iframe>' +
          '</div>' +
          '<p class="mt-4 text-center text-sm"><a href="' +
          urlWithSubjek.replace(/"/g, '&quot;') +
          '" target="_blank" rel="noopener noreferrer" class="font-medium text-amber-800 underline decoration-amber-400 underline-offset-4 hover:text-amber-950">Buka kuiz di tab baharu</a> jika bingkai tidak memuat.</p>';
      } else if (mount) {
        mount.innerHTML =
          '<div class="flex flex-col items-center justify-center gap-4 rounded-xl border border-dashed border-slate-300 bg-slate-50/80 px-6 py-16 text-center">' +
          '<p class="max-w-md text-sm text-slate-600">Kandungan peperiksaan <strong class="text-slate-800">' +
          label +
          '</strong> akan dipaparkan di sini tidak lama lagi.</p>' +
          '</div>';
      }
    })();
  </script>
</body>
</html>
